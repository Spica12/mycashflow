{% extends "base.html" %}

{% block title %}MyCashFlow — Головна{% endblock %}

{% block styles %}
<style>
    h1 {
        font-size: 3rem;
        margin-bottom: 10px;
    }

    p {
        font-size: 1.2rem;
        color: #666;
        margin-bottom: 30px; /* Відступ перед інтерактивною зоною */
    }

    /* Контейнер для кнопок, щоб вони стояли в один ряд */
    .button-group {
        display: flex;
        justify-content: center;
        gap: 15px;
    }

    .btn {
        display: inline-block;
        padding: 12px 24px;
        text-decoration: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: bold;
        transition: 0.2s;
    }

    /* Основна синя кнопка для Входу */
    .btn-primary {
        background-color: #0d6efd;
        color: white;
    }

    .btn-primary:hover {
        background-color: #0b5ed7;
    }

    /* Прозора кнопка із синім контуром для Реєстрації */
    .btn-secondary {
        background-color: transparent;
        color: #0d6efd;
        border: 2px solid #0d6efd;
        padding: 10px 22px; /* Коригування падінгів через рамку (border) */
    }

    .btn-secondary:hover {
        background-color: rgba(13, 110, 253, 0.05);
    }

    /* Стиль для посилання на валюти */
    .currencies-link {
        display: inline-block;
        color: #333;
        text-decoration: none;
        font-size: 1.1rem;
        font-weight: bold;
        padding: 12px 24px;
        border: 1px solid #ccc;
        border-radius: 8px;
        background-color: white;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
        transition: 0.2s;
    }

    .currencies-link:hover {
        color: #0d6efd;
        border-color: #0d6efd;
        box-shadow: 0 4px 10px rgba(13, 110, 253, 0.05);
    }
</style>
{% endblock %}

{% block content %}

    <!-- Динамічний блок авторизації -->
    {% if user %}
        <!-- Показуємо лише залогіненим користувачам -->
        <div>
            <a href="/currencies" class="currencies-link">
                🪙 Керування курсами валют
            </a>
        </div>
    {% endif %}
{% endblock %}
