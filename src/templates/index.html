{% extends "base.html" %}

{% block title %}MyCashFlow — Головна{% endblock %}

{% block styles %}
<style>
    h1 {
        font-size: 3rem;
        margin-bottom: 10px;
    }

    p {
        font-size: 1.2rem;
        color: #666;
    }

    .btn {
        display: inline-block;
        margin-top: 25px;
        padding: 12px 24px;
        background-color: #0d6efd;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        transition: 0.2s;
    }

    .btn:hover {
        background-color: #0b5ed7;
    }
</style>
{% endblock %}

{% block content %}
    <h1>MyCashFlow</h1>
    <p>Персональна система обліку доходів, витрат та активів</p>

    <a href="/login" class="btn">
        Увійти
    </a>
{% endblock %}
