{% extends "base.html" %}

{% block title %}Нова валюта{% endblock %}

{% block styles %}
<style>
    .form-group {
        margin-bottom: 15px;
        text-align: left;
    }
    label {
        display: block;
        font-size: 0.9rem;
        margin-bottom: 5px;
        font-weight: bold;
    }
    .form-control {
        width: 100%;
        padding: 8px;
        font-size: 1rem;
        box-sizing: border-box;
    }
    .btn-submit {
        padding: 10px 20px;
        background-color: #0d6efd;
        color: white;
        border: none;
        font-weight: bold;
        cursor: pointer;
    }
    .btn-submit:hover {
        background-color: #0b5ed7;
    }
    .error-block {
        display: none;
        background-color: #f8d7da;
        color: #842029;
        padding: 10px;
        margin-bottom: 15px;
        text-align: left;
    }
</style>
{% endblock %}

{% block content %}
    <h2>Додати нову валюту</h2>

    <div id="errorBlock" class="error-block"></div>

    <form id="addCurrencyForm" style="max-width: 300px; margin: 0 auto;">
        <div class="form-group">
            <label for="currencyId">ISO Код (3 літери)</label>
            <input type="text" id="currencyId" class="form-control" placeholder="USD" required maxlength="3" style="text-transform: uppercase;">
        </div>

        <div class="form-group">
            <label for="currencyName">Назва валюти</label>
            <input type="text" id="currencyName" class="form-control" placeholder="Долар США" required>
        </div>

        <div class="form-group">
            <label for="currencyRate">Курс приведення</label>
            <input type="number" id="currencyRate" class="form-control" step="0.0001" value="1.0000" required>
        </div>

        <div style="text-align: left; margin-top: 20px;">
            <button type="submit" class="btn-submit">Створити</button>
            <a href="/currencies" style="margin-left: 15px; color: #666; text-decoration: none;">Скасувати</a>
        </div>
    </form>

<script>
document.getElementById('addCurrencyForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const errBlock = document.getElementById('errorBlock');
    errBlock.style.display = 'none';

    const payload = {
        id: document.getElementById('currencyId').value.toUpperCase(),
        name: document.getElementById('currencyName').value,
        rate: parseFloat(document.getElementById('currencyRate').value),
        is_main: false
    };

    try {
        const response = await fetch('/api/currencies/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            window.location.href = '/currencies';
        } else {
            const data = await response.json();
            errBlock.innerText = data.detail || 'Помилка при створенні валюти';
            errBlock.style.display = 'block';
        }
    } catch (err) {
        errBlock.innerText = 'Не вдалося з’єднатися із сервером';
        errBlock.style.display = 'block';
    }
});
</script>
{% endblock %}
