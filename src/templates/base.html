<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MyCashFlow{% endblock %}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        .container {
            text-align: center;
        }
    </style>

    <!-- Місце для унікальних стилів окремих сторінок -->
    {% block styles %}{% endblock %}
</head>
<body>
    <div class="container">
        {% block content %}
        <!-- Контент сторінок буде підставлятися сюди -->
        {% endblock %}
    </div>
</body>
</html>
