<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MyCashFlow{% endblock %}</title>

    <style>
        /* Глобальні мінімалістичні стилі */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            min-vh-100;
            display: flex;
            flex-direction: column;
        }

        /* Верхня панель (Navbar) */
        .navbar {
            background-color: #333;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between; /* Бренд/Кнопка вліво, зона дій вправо */
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        /* Кнопка зліва зверху для повернення на головну */
        .navbar-brand {
            color: white;
            text-decoration: none;
            font-size: 1.4rem;
            font-weight: bold;
            transition: 0.2s;
        }

        .navbar-brand:hover {
            color: #0d6efd; /* Зміна кольору при наведенні */
        }

        /* Навігаційна зона праворуч зверху */
        .navbar-user-zone {
            display: flex;
            align-items: center;
            gap: 20px; /* Відступи між елементами праворуч */
            font-size: 1rem;
        }

        /* Спільні стилі для текстових посилань у навбарі */
        .navbar-link {
            color: #ddd;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }

        .navbar-link:hover {
            color: white;
            text-decoration: underline;
        }

        /* Спеціальний колір для кнопки Вийти */
        .logout-link {
            color: #ff4d4d;
        }

        .logout-link:hover {
            color: #ff3333;
        }

        /* Контейнер для центрування вмісту сторінок */
        .main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            text-align: center;
        }
    </style>

    {% block styles %}{% endblock %}
</head>
<body>

    <!-- Верхня панель навігації -->
    <header>
        <div class="navbar">
            <!-- Зліва зверху: Кнопка-назва для повернення на головну -->
            <a class="navbar-brand" href="/">📦 MyCashFlow</a>

            <!-- Праворуч зверху: Динамічна зона залежно від авторизації -->
            <div class="navbar-user-zone">
                {% if user %}
                    <!-- Якщо користувач залогінився: показуємо email та кнопку Вийти -->
                    <span style="color: white;">👤 {{ user.email }}</span>
                    <a href="/auth/logout" class="navbar-link logout-link">Вийти</a>
                {% else %}
                    <!-- Якщо не авторизований: показуємо Увійти та Реєстрація -->
                    <a href="/auth/login" class="navbar-link">Увійти</a>
                    <a href="/auth/register" class="navbar-link" style="color: #0d6efd;">Реєстрація</a>
                {% endif %}
            </div>
        </div>
    </header>

    <!-- Основний вміст кожної сторінки сайту -->
    <main class="main-content">
        <div class="container">
            {% block content %}
            <!-- Сюди підставляється унікальний HTML кожної сторінки -->
            {% endblock %}
        </div>
    </main>

</body>
</html>
